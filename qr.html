<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMAC — QR Generator</title>
    <script>
        (function() {
            const PASSWORD = 'mmac2025';
            const stored = sessionStorage.getItem('qr_auth');
            if (stored !== PASSWORD) {
                const input = prompt('Enter password:');
                if (input !== PASSWORD) {
                    document.write('<h2 style="font-family:sans-serif;text-align:center;margin-top:100px;color:#ef4444;">Access denied.</h2>');
                    throw new Error('Access denied');
                }
                sessionStorage.setItem('qr_auth', PASSWORD);
            }
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; padding: 32px 24px; }

        h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
        h1 span { color: #2563eb; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 28px; }

        /* Table */
        .table-wrap { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #f1f5f9; }
        th { text-align: left; padding: 12px 16px; font-size: 0.78rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 14px 16px; font-size: 0.9rem; border-top: 1px solid #f1f5f9; vertical-align: middle; }
        tr:hover td { background: #f8fafc; }
        .project-name { font-weight: 600; }
        .project-number { color: #64748b; font-size: 0.82rem; }
        .elevators-badge {
            display: inline-block; background: #eff6ff; color: #2563eb;
            font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
        }
        .qr-btn {
            background: #2563eb; color: white; border: none; padding: 8px 18px;
            border-radius: 8px; font-size: 0.82rem; font-weight: 700; cursor: pointer;
            transition: background 0.15s; white-space: nowrap;
        }
        .qr-btn:hover { background: #1d4ed8; }
        .loading-row td { text-align: center; padding: 48px; color: #94a3b8; }

        /* Modal */
        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 20px; padding: 32px; max-width: 700px;
            width: 100%; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .modal-title { font-size: 1.1rem; font-weight: 800; }
        .modal-subtitle { font-size: 0.85rem; color: #64748b; margin-top: 2px; }
        .close-btn {
            background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 8px;
            font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .qr-row { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
        .qr-card { text-align: center; }
        .qr-card-label { font-weight: 700; font-size: 0.9rem; margin-bottom: 2px; }
        .qr-card-el { font-size: 0.78rem; color: #64748b; margin-bottom: 8px; }
        .qr-card img { width: 200px; height: 200px; border-radius: 10px; display: block; }
        .type-toggle { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
        .type-btn {
            padding: 4px 12px; border-radius: 6px; border: 1px solid #e2e8f0;
            font-size: 0.75rem; font-weight: 700; cursor: pointer; background: #f8fafc; color: #64748b;
        }
        .type-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .modal-footer { margin-top: 24px; text-align: center; }
        .print-btn {
            background: #0f172a; color: white; border: none; padding: 10px 28px;
            border-radius: 8px; font-size: 0.88rem; font-weight: 700; cursor: pointer;
        }

        @media print {
            body { padding: 0; background: white; }
            .table-wrap, .overlay { display: none !important; }
        }
    </style>
</head>
<body>
    <h1>MMAC <span>Service</span> Tracker</h1>
    <p class="subtitle">Select a project and click Generate QR</p>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Project Name</th>
                    <th>Project Number</th>
                    <th>Elevators</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr class="loading-row"><td colspan="5">Loading projects...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div class="overlay" id="overlay" onclick="closeModal(event)">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="modal-title"></div>
                    <div class="modal-subtitle" id="modal-subtitle"></div>
                </div>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="qr-row" id="modal-qr-row"></div>
            <div class="modal-footer">
                <button class="print-btn" onclick="printQR()">Print</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://colzziybbrlkrhiwjmhc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvbHp6aXliYnJsa3JoaXdqbWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzI5MzUsImV4cCI6MjA5MDYwODkzNX0.Ytyn3QS2Mn34xdANODHZ3N-QdFDYpAmnrNsOAbJRIMA';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const APP_URL = 'https://insolemment.github.io/mmac-tracker';

        let allSites = [];
        let currentSite = null;

        function getElevatorCount(num) {
            const match = (num || '').toString().trim().match(/[-(\s](\d+)\)?$/);
            const c = match ? parseInt(match[1]) : 1;
            return (c > 50 || c < 1) ? 1 : c;
        }

        function makeQrUrl(siteId, el, type) {
            return `${APP_URL}/?site=${siteId}&el=${el}&unit=${type || 'l'}`;
        }

        function makeQrImgSrc(url, size) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}`;
        }

        async function load() {
            const { data: sites, error } = await db.from('sites').select('*').order('id');
            if (error) {
                document.getElementById('table-body').innerHTML = `<tr class="loading-row"><td colspan="5" style="color:#ef4444;">Error: ${error.message}</td></tr>`;
                return;
            }
            allSites = sites;
            const tbody = document.getElementById('table-body');
            if (!sites.length) {
                tbody.innerHTML = '<tr class="loading-row"><td colspan="5">No projects found.</td></tr>';
                return;
            }
            tbody.innerHTML = sites.map(s => {
                const count = getElevatorCount(s.number);
                return `<tr>
                    <td style="color:#94a3b8;font-size:0.8rem;">${s.id}</td>
                    <td><div class="project-name">${s.name}</div></td>
                    <td><div class="project-number">${s.number}</div></td>
                    <td><span class="elevators-badge">${count} elevator${count > 1 ? 's' : ''}</span></td>
                    <td><button class="qr-btn" onclick="openModal(${s.id})">Generate QR</button></td>
                </tr>`;
            }).join('');
        }

        // types[el] = 'L' or 'ESC'
        let unitTypes = {};

        function openModal(siteId) {
            const site = allSites.find(s => String(s.id) === String(siteId));
            if (!site) return;
            currentSite = site;
            unitTypes = {};
            const count = getElevatorCount(site.number);

            document.getElementById('modal-title').textContent = site.name;
            document.getElementById('modal-subtitle').textContent = site.number;

            const row = document.getElementById('modal-qr-row');
            row.innerHTML = '';
            for (let el = 1; el <= count; el++) {
                unitTypes[el] = 'L';
                const url = makeQrUrl(site.id, el, 'l');
                const div = document.createElement('div');
                div.className = 'qr-card';
                div.id = `qr-card-${el}`;
                div.innerHTML = `
                    <div class="qr-card-label">${site.number}</div>
                    <div class="type-toggle">
                        <button class="type-btn active" id="btn-L-${el}" onclick="setType(${el},'l')">L${el}</button>
                        <button class="type-btn" id="btn-ESC-${el}" onclick="setType(${el},'esc')">ESC${el}</button>
                    </div>
                    <img id="qr-img-${el}" src="${makeQrImgSrc(url, 200)}" alt="QR ${el}" />`;
                row.appendChild(div);
            }
            document.getElementById('overlay').classList.add('show');
        }

        function setType(el, type) {
            unitTypes[el] = type;
            document.getElementById(`btn-L-${el}`).classList.toggle('active', type === 'l');
            document.getElementById(`btn-ESC-${el}`).classList.toggle('active', type === 'esc');
            // Regenerate QR image with updated URL
            const url = makeQrUrl(currentSite.id, el, type);
            document.getElementById(`qr-img-${el}`).src = makeQrImgSrc(url, 200);
        }

        function closeModal(e) {
            if (e && e.target !== document.getElementById('overlay')) return;
            document.getElementById('overlay').classList.remove('show');
        }

        function printQR() {
            if (!currentSite) return;
            const count = getElevatorCount(currentSite.number);
            let cards = '';
            for (let el = 1; el <= count; el++) {
                const type = unitTypes[el] || 'l';
                const url = makeQrUrl(currentSite.id, el, type);
                const label = `${type.toUpperCase()}${el}`;
                cards += `<div style="text-align:center;display:inline-block;margin:12px;">
                    <div style="font-weight:700;font-size:1rem;">${currentSite.number}</div>
                    <div style="color:#64748b;font-size:0.85rem;margin:4px 0 10px;">${label}</div>
                    <img src="${makeQrImgSrc(url, 240)}" style="width:240px;height:240px;" />
                </div>`;
            }
            const w = window.open('', '_blank');
            w.document.write(`<!DOCTYPE html><html><head><title>QR - ${currentSite.name}</title>
            <style>body{font-family:sans-serif;text-align:center;padding:32px;}
            h2{margin-bottom:24px;font-size:1.2rem;}</style></head>
            <body><h2>${currentSite.name} — ${currentSite.number}</h2>${cards}
            <script>window.onload=()=>window.print();<\/script></body></html>`);
        }

        load();
    </script>
</body>
</html>
